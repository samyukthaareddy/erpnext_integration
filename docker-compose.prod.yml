version: "3.9"

services:
  crm-api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/crm/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
